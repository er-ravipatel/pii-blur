<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    /* Header */
    .header {
      background: #16213e;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h2 { font-size: 15px; font-weight: 600; }
    .header .tagline { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* Toggle switch */
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #555; border-radius: 22px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #2ecc71; }
    input:checked + .slider::before { transform: translateX(18px); }

    /* Domain bar */
    .domain-bar {
      padding: 10px 16px;
      background: #f8f9ff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .domain-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #bbb;
      flex-shrink: 0;
    }
    .domain-bar .dot.active { background: #2ecc71; }
    .domain-name {
      font-weight: 600; color: #333;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex-shrink: 0;
      max-width: 120px;
    }
    .path-name {
      font-size: 11px; color: #888;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1;
    }
    .count-badge {
      margin-left: auto;
      background: #e8eeff;
      color: #5566cc;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    /* Blur items list */
    .items-section { padding: 0; max-height: 260px; overflow-y: auto; }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #999;
      line-height: 1.6;
    }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
    .empty-state strong { color: #555; }

    /* Each blurred element row */
    .blur-item {
      padding: 9px 14px 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .blur-item:hover { background: #fafafa; }

    .item-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .item-icon { font-size: 14px; flex-shrink: 0; }
    .item-text { flex: 1; min-width: 0; }
    .item-label {
      font-size: 12px;
      font-weight: 500;
      color: #222;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item-selector {
      font-size: 10px;
      color: #bbb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ddd;
      font-size: 15px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .delete-btn:hover { color: #e74c3c; }

    /* Per-item intensity row */
    .item-intensity {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 22px;
    }
    .intensity-label {
      font-size: 10px;
      color: #aaa;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .mini-slider {
      flex: 1;
      accent-color: #16213e;
      cursor: pointer;
      height: 3px;
    }
    .mini-val {
      font-size: 11px;
      font-weight: 600;
      color: #16213e;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Actions */
    .actions {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }
    .btn-primary { background: #16213e; color: #fff; }
    .btn-primary:hover { background: #1a2a55; }
    .btn-primary.active { background: #e67e22; border-color: #e67e22; }
    .btn-danger { background: #fff; color: #e74c3c; border-color: #e74c3c; }
    .btn-danger:hover { background: #fff5f5; }

    .status-bar {
      padding: 7px 16px;
      font-size: 11px;
      color: #888;
      text-align: center;
      min-height: 26px;
      border-top: 1px solid #f0f0f0;
    }
    .status-bar.ok { color: #27ae60; }
    .status-bar.info { color: #2980b9; }
    .status-bar.warn { color: #e67e22; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span style="font-size:20px">🔒</span>
      <div>
        <h2>PII Blur</h2>
        <div class="tagline">Blur anything, on any site</div>
      </div>
    </div>
    <label class="toggle" title="Enable / disable blurs on this site">
      <input type="checkbox" id="toggleEnabled" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="domain-bar">
    <div class="dot" id="statusDot"></div>
    <span class="domain-name" id="domainName">Loading…</span>
    <span class="path-name" id="pathName"></span>
    <span class="count-badge" id="countBadge">0 blurs</span>
  </div>

  <div class="items-section" id="itemsList">
    <div class="empty-state">
      <div class="icon">👆</div>
      <strong>No blurs set for this site yet.</strong><br/>
      Click "Select element to blur" to get started.
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="addBtn">
      <span>＋</span> Select element to blur
    </button>
    <button class="btn btn-danger" id="clearBtn" style="display:none">
      ✕ Clear all blurs on this site
    </button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <script src="popup.js"></script>
</body>
</html>
